name: Android Gradle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure Gradle wrapper uses remote distribution URL
        run: |
          file=gradle/wrapper/gradle-wrapper.properties
          if [ ! -f "$file" ]; then echo "Missing $file"; exit 1; fi
          sed -i 's|^distributionUrl=.*$|distributionUrl=https://services.gradle.org/distributions/gradle-9.4.1-bin.zip|' "$file"
          echo "Updated distUrl to https://services.gradle.org/distributions/gradle-9.4.1-bin.zip"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Gradle build (debug + unsigned release)
        run: |
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload APKs as artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: apk-artifacts
          path: app/build/outputs/apk/**

      - name: Upload build scan quickly
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-failure-logs
          path: build/reports/**
